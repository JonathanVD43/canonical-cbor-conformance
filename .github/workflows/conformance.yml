name: Conformance

on:
  push:
    branches: [master]
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install harness dependencies
        run: pip install -r requirements.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust adapter
        run: cargo build --release
        working-directory: adapters/rust

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Kotlin adapter
        run: ./gradlew installDist --no-daemon
        working-directory: adapters/kotlin

      - name: Test Java adapter
        run: ./gradlew test --no-daemon
        working-directory: adapters/java

      - name: Build Java adapter
        run: ./gradlew installDist --no-daemon
        working-directory: adapters/java

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install TypeScript adapter dependencies
        run: npm ci
        working-directory: adapters/typescript

      - name: Typecheck TypeScript adapter
        run: npm run typecheck
        working-directory: adapters/typescript

      - name: Test TypeScript adapter
        run: npm test
        working-directory: adapters/typescript

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Go adapter
        run: go build -o adapter .
        working-directory: adapters/go

      - name: Test Go adapter
        run: go test ./...
        working-directory: adapters/go

      - name: Test Python adapter
        run: python3 -m pytest -q
        working-directory: adapters/python

      - name: Mark Python adapter CLI executable
        run: chmod +x adapters/python/main.py

      - name: Build C adapter
        run: make adapter
        working-directory: adapters/c

      - name: Build and run C adapter unit tests (ASan + UBSan)
        run: make test-asan
        working-directory: adapters/c

      - name: Run conformance harness
        run: python3 harness/run.py

      - name: Upload harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-report
          path: harness/report/latest.json
